name: Release
on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./internal/...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p cmd/quadlet-manager/web
          cp -r web/dist cmd/quadlet-manager/web/
          go build -ldflags "-s -w -X github.com/choken/quadlet-manager/internal/version.Version=$VERSION" \
            -o quadlet-manager-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/quadlet-manager

      - uses: actions/upload-artifact@v4
        with:
          name: quadlet-manager-${{ matrix.goos }}-${{ matrix.goarch }}
          path: quadlet-manager-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum */* > ../checksums.txt

      - name: Extract changelog
        id: changelog
        run: |
          # Extract the latest version section from CHANGELOG.md
          VERSION=${GITHUB_REF#refs/tags/}
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file for multi-line content
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            artifacts/*/*
            checksums.txt
